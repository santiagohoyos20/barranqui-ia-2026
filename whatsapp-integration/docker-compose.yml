version: '3.9'

services:
  # Servidor principal de WhatsApp + Agente
  whatsapp-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-agent-integration
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID}
      - WHATSAPP_BUSINESS_ACCOUNT_ID=${WHATSAPP_BUSINESS_ACCOUNT_ID}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN}
      - WHATSAPP_WEBHOOK_TOKEN=${WHATSAPP_WEBHOOK_TOKEN}
      - AGENT_API_URL=${AGENT_API_URL:-http://agent-mock:3001}
      - PORT=3000
      - NODE_ENV=${NODE_ENV:-development}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      # Volumen para logs
      - ./logs:/app/logs
    networks:
      - whatsapp-network
    restart: unless-stopped
    depends_on:
      - agent-mock
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/webhook/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Agente IA Mock (solo para desarrollo)
  agent-mock:
    image: node:18-alpine
    container_name: whatsapp-agent-mock
    working_dir: /app
    ports:
      - "3001:3001"
    volumes:
      - ./examples:/app
    command: node agent-mock.js
    networks:
      - whatsapp-network
    restart: unless-stopped
    environment:
      - PORT=3001

networks:
  whatsapp-network:
    driver: bridge
