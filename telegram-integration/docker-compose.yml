version: '3.9'

services:
  # Servidor principal: Telegram webhook + Agente IA (Anthropic Claude)
  telegram-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-agent-integration
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # --- Telegram ---
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_WEBHOOK_SECRET_TOKEN=${TELEGRAM_WEBHOOK_SECRET_TOKEN}
      - TELEGRAM_WEBHOOK_URL=${TELEGRAM_WEBHOOK_URL}
      - TELEGRAM_WEBHOOK_PATH=${TELEGRAM_WEBHOOK_PATH:-/webhook/telegram}

      # --- Agente IA (Anthropic Claude) ---
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      - AGENT_SYSTEM_PROMPT=${AGENT_SYSTEM_PROMPT:-}

      # --- Servidor ---
      - PORT=3000
      - NODE_ENV=${NODE_ENV:-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}

      # --- Supabase (persistencia) ---
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - KNOWLEDGE_BASE_PATH=${KNOWLEDGE_BASE_PATH:-}
    volumes:
      - ./logs:/app/logs
    networks:
      - telegram-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/webhook/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  telegram-network:
    driver: bridge
