version: '3.9'

services:
  # Servidor principal de Telegram + Agente
  telegram-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-agent-integration
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_WEBHOOK_SECRET_TOKEN=${TELEGRAM_WEBHOOK_SECRET_TOKEN}
      - TELEGRAM_WEBHOOK_URL=${TELEGRAM_WEBHOOK_URL}
      - TELEGRAM_WEBHOOK_PATH=${TELEGRAM_WEBHOOK_PATH:-/webhook/telegram}
      - AGENT_API_URL=${AGENT_API_URL:-http://agent-mock:3001}
      - AGENT_API_KEY=${AGENT_API_KEY}
      - PORT=3000
      - NODE_ENV=${NODE_ENV:-development}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      # Volumen para logs
      - ./logs:/app/logs
    networks:
      - telegram-network
    restart: unless-stopped
    depends_on:
      - agent-mock
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/webhook/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Agente IA Mock (solo para desarrollo)
  agent-mock:
    image: node:18-alpine
    container_name: telegram-agent-mock
    working_dir: /app
    ports:
      - "3001:3001"
    volumes:
      - ./examples:/app
    command: node agent-mock.js
    networks:
      - telegram-network
    restart: unless-stopped
    environment:
      - PORT=3001

networks:
  telegram-network:
    driver: bridge
